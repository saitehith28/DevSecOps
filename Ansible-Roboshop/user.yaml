- name: configure user
  hosts: user
  become: yes
  tasks:
  - name: enable nodejs 20
    ansible.builtin.command: dnf module enable nodejs:20 -yes

  - name: install nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: create system user roboshop
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "Roboshop System user"
  
  - name: Delete App Directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: Create App Directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Delete user Zip File
    ansible.builtin.file:
      path: /tmp/user.zip
      state: absent

  - name: Download user Zip File
    ansible.builtin.file:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
      dest: /tmp/user.zip

  - name: Unarchive user
    ansible.builtin.Unarchive:
      src: /tmp/user.zip
      dest: /app
      rempte_src: yes
  
  - name: install dependencies
    community.general.np:
      path: /app

  - name: copy user service
    ansible.builtin.copy:
      src: user.service
      dest: /etc/systemd/system/user.service

  - name: daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true
      
  - name: start user
    ansible.builtin.service:
      name: user
      state: restarted
      enabled: yes